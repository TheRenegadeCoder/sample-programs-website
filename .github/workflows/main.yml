name: Website Automation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: 0 0 * * 0
  workflow_dispatch:

jobs:
  images:
    name: Deployment
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - uses: abatilo/actions-poetry@v4
        with:
          poetry-version: '2.3.3'
    
      - name: Install Dependencies
        run: poetry install

      - name: Generate Webpages and Images
        run: poetry run python scripts/automate.py

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Cache Jekyll gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-jekyll-bundle-${{ hashFiles('docs/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-jekyll-bundle-

      - name: Install Jekyll dependencies
        if: ${{ github.ref != 'refs/heads/main' }}
        run: |
          cd docs
          bundle config set path ../vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Build Webpages with Jekyll
        if: ${{ github.ref != 'refs/heads/main' }}
        run: |
          cd docs
          bundle exec jekyll build --config _config.yml --destination _site

      - name: Commit Changes
        uses: EndBug/add-and-commit@v9 
        with:
          message: |
            Generated Sample Programs website automatically
            
            
            on-behalf-of: @TheRenegadeCoder <jeremy.grifski@therenegadecoder.com>
          author_name: GitHub Actions
          author_email: action@github.com

        env:
          # This is necessary in order to push a commit to the repo
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Leave this line unchanged

        # Only commit if on main branch
        if: ${{ github.ref == 'refs/heads/main' }}
