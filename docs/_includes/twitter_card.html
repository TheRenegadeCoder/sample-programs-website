{% assign image_file = page.featured-image | default: site.title_image %}

<!-- Twitter cards -->
<meta name="twitter:title" content="{{ page.title }}">
<meta name="twitter:description" content="{{ page.excerpt | strip_html }}">

<meta name="twitter:card" content="{% if page.featured-image %}summary_large_image{% else %}summary{% endif %}">
<meta name="twitter:image" content="{{ '/assets/images/' | append: image_file | absolute_url }}">
<!-- end of Twitter cards -->
